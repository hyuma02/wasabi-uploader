<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wasabi Uploader</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap');

    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --border: #222222;
      --accent: #e8ff3d;
      --accent2: #ff6b35;
      --text: #f0f0f0;
      --muted: #555555;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: 
        radial-gradient(ellipse at 20% 20%, rgba(232,255,61,0.03) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(255,107,53,0.03) 0%, transparent 50%);
      pointer-events: none;
    }

    .container {
      width: 100%;
      max-width: 600px;
      position: relative;
    }

    .header {
      margin-bottom: 3rem;
    }

    .header h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1;
      margin-bottom: 0.5rem;
    }

    .header h1 span {
      color: var(--accent);
    }

    .header p {
      color: var(--muted);
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .upload-area {
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 3rem 2rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s ease;
      position: relative;
      background: var(--surface);
      margin-bottom: 1rem;
    }

    .upload-area::before {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: 2px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      opacity: 0;
      transition: opacity 0.2s ease;
      z-index: -1;
    }

    .upload-area:hover::before,
    .upload-area.drag-over::before {
      opacity: 1;
    }

    .upload-area:hover,
    .upload-area.drag-over {
      border-color: transparent;
      background: #161616;
    }

    .upload-icon {
      width: 48px;
      height: 48px;
      margin: 0 auto 1.5rem;
      opacity: 0.4;
      transition: opacity 0.2s;
    }

    .upload-area:hover .upload-icon {
      opacity: 1;
    }

    .upload-area p {
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 0.5rem;
    }

    .upload-area .main-text {
      font-family: 'Syne', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    #fileInput {
      display: none;
    }

    .file-info {
      display: none;
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 1rem 1.5rem;
      margin-bottom: 1rem;
      border-radius: 2px;
    }

    .file-info.visible {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .file-name {
      font-size: 0.8rem;
      color: var(--accent);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 70%;
    }

    .file-size {
      font-size: 0.7rem;
      color: var(--muted);
    }

    .btn-upload {
      width: 100%;
      padding: 1rem;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 2px;
      font-family: 'Syne', sans-serif;
      font-size: 0.9rem;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s ease;
      display: none;
    }

    .btn-upload.visible {
      display: block;
    }

    .btn-upload:hover {
      background: #fff;
      transform: translateY(-1px);
    }

    .btn-upload:active {
      transform: translateY(0);
    }

    .btn-upload:disabled {
      background: var(--muted);
      cursor: not-allowed;
      transform: none;
    }

    .progress-bar {
      display: none;
      width: 100%;
      height: 2px;
      background: var(--border);
      margin-top: 1rem;
      border-radius: 1px;
      overflow: hidden;
    }

    .progress-bar.visible {
      display: block;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      width: 0%;
      transition: width 0.3s ease;
    }

    .status {
      margin-top: 1.5rem;
      font-size: 0.75rem;
      letter-spacing: 0.05em;
      min-height: 1.2em;
    }

    .status.success { color: var(--accent); }
    .status.error { color: var(--accent2); }
    .status.loading { color: var(--muted); }

    .log {
      margin-top: 2rem;
      border-top: 1px solid var(--border);
      padding-top: 1.5rem;
    }

    .log-title {
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1rem;
    }

    .log-entries {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      max-height: 200px;
      overflow-y: auto;
    }

    .log-entry {
      font-size: 0.7rem;
      color: var(--muted);
      display: flex;
      gap: 1rem;
    }

    .log-entry .time {
      color: var(--border);
      flex-shrink: 0;
    }

    .log-entry.success .msg { color: var(--accent); }
    .log-entry.error .msg { color: var(--accent2); }
    .log-entry.info .msg { color: var(--text); }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>WASABI<br><span>UPLOADER</span></h1>
      <p>Hot Storage — Direct Upload</p>
    </div>

    <div class="upload-area" id="uploadArea">
      <svg class="upload-icon" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M24 8L24 32M24 8L16 16M24 8L32 16" stroke="currentColor" stroke-width="2" stroke-linecap="square"/>
        <path d="M8 36H40V40H8V36Z" stroke="currentColor" stroke-width="2"/>
      </svg>
      <p class="main-text">ファイルをドロップ</p>
      <p>またはクリックして選択</p>
      <input type="file" id="fileInput">
    </div>

    <div class="file-info" id="fileInfo">
      <span class="file-name" id="fileName">—</span>
      <span class="file-size" id="fileSize">—</span>
    </div>

    <button class="btn-upload" id="btnUpload">UPLOAD TO WASABI</button>

    <div class="progress-bar" id="progressBar">
      <div class="progress-fill" id="progressFill"></div>
    </div>

    <div class="status" id="status"></div>

    <div class="log">
      <div class="log-title">// Activity Log</div>
      <div class="log-entries" id="logEntries"></div>
    </div>
  </div>

  <script>
    // ========================================
    // 設定（Cloudflare Pages の環境変数から取得）
    // ========================================
    const WASABI_ENDPOINT = 'https://s3.ap-northeast-1.wasabisys.com';
    const BUCKET_NAME = 'image-upload-original';

    // ========================================
    // UI要素
    // ========================================
    const uploadArea = document.getElementById('uploadArea');
    const fileInput = document.getElementById('fileInput');
    const fileInfo = document.getElementById('fileInfo');
    const fileName = document.getElementById('fileName');
    const fileSize = document.getElementById('fileSize');
    const btnUpload = document.getElementById('btnUpload');
    const progressBar = document.getElementById('progressBar');
    const progressFill = document.getElementById('progressFill');
    const status = document.getElementById('status');
    const logEntries = document.getElementById('logEntries');

    let selectedFile = null;

    // ========================================
    // ログ追加
    // ========================================
    function addLog(msg, type = 'info') {
      const now = new Date();
      const time = now.toTimeString().slice(0, 8);
      const entry = document.createElement('div');
      entry.className = `log-entry ${type}`;
      entry.innerHTML = `<span class="time">${time}</span><span class="msg">${msg}</span>`;
      logEntries.prepend(entry);
    }

    // ========================================
    // ファイル選択
    // ========================================
    function handleFile(file) {
      selectedFile = file;
      fileName.textContent = file.name;
      fileSize.textContent = formatSize(file.size);
      fileInfo.classList.add('visible');
      btnUpload.classList.add('visible');
      status.textContent = '';
      addLog(`ファイル選択: ${file.name}`, 'info');
    }

    function formatSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    }

    uploadArea.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', (e) => {
      if (e.target.files[0]) handleFile(e.target.files[0]);
    });

    uploadArea.addEventListener('dragover', (e) => {
      e.preventDefault();
      uploadArea.classList.add('drag-over');
    });

    uploadArea.addEventListener('dragleave', () => {
      uploadArea.classList.remove('drag-over');
    });

    uploadArea.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadArea.classList.remove('drag-over');
      if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
    });

    // ========================================
    // アップロード
    // ========================================
    btnUpload.addEventListener('click', async () => {
      if (!selectedFile) return;

      btnUpload.disabled = true;
      progressBar.classList.add('visible');
      progressFill.style.width = '0%';
      status.className = 'status loading';
      status.textContent = 'Uploading...';
      addLog('アップロード開始...', 'info');

      try {
        // Cloudflare Workerを経由してアップロード
        const formData = new FormData();
        formData.append('file', selectedFile);

        const xhr = new XMLHttpRequest();

        xhr.upload.addEventListener('progress', (e) => {
          if (e.lengthComputable) {
            const pct = Math.round((e.loaded / e.total) * 100);
            progressFill.style.width = pct + '%';
          }
        });

        xhr.addEventListener('load', () => {
          if (xhr.status === 200) {
            progressFill.style.width = '100%';
            status.className = 'status success';
            status.textContent = '✓ Upload complete';
            addLog(`完了: ${selectedFile.name}`, 'success');
            btnUpload.disabled = false;
          } else {
            throw new Error(`HTTP ${xhr.status}`);
          }
        });

        xhr.addEventListener('error', () => {
          throw new Error('Network error');
        });

        // Cloudflare Workerのエンドポイント
        xhr.open('POST', '/api/upload');
        xhr.send(formData);

      } catch (err) {
        status.className = 'status error';
        status.textContent = `✗ Error: ${err.message}`;
        addLog(`エラー: ${err.message}`, 'error');
        btnUpload.disabled = false;
      }
    });

    addLog('System ready', 'info');
  </script>
</body>
</html>
